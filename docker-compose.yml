services:
  vrikshvera:
    build: .
    ports:
      - "8001:80"
    volumes:
      - .:/usr/share/nginx/html # Live reload during development
    restart: always
    depends_on:
      - api

  api:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    restart: always
